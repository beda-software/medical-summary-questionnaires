resourceType: Questionnaire
id: aups-curated-questionnaire
url: aups-curated-questionnaire
status: active
meta:
  profile:
    - https://emr-core.beda.software/StructureDefinition/fhir-emr-questionnaire
title: Australian Patient Summary (AUPS)
name: aups-curated-questionnaire
mapping:
  - reference: urn:uuid:Mapping:curated-aups-extract
subjectType:
  - Patient
launchContext:
  - name:
      code: Patient
    type:
      - Patient
  - name:
      code: Author
    type:
      - Practitioner
      - Organization
contained:
  - resourceType: Bundle
    id: PatientConditionsBundle
    type: transaction
    entry:
      - request:
          method: GET
          url: /Condition?patient={{%Patient.id}}
  - resourceType: Bundle
    id: PatientAllergiesBundle
    type: transaction
    entry:
      - request:
          method: GET
          url: /AllergyIntolerance?patient={{%Patient.id}}
  - resourceType: Bundle
    id: PatientMedicationStatementsBundle
    type: transaction
    entry:
      - request:
          method: GET
          url: /MedicationStatement?subject={{%Patient.id}}
  - resourceType: Bundle
    id: PatientImmunizationsBundle
    type: transaction
    entry:
      - request:
          method: GET
          url: /Immunization?patient={{%Patient.id}}
  - resourceType: Bundle
    id: PatientProceduresBundle
    type: transaction
    entry:
      - request:
          method: GET
          url: /Procedure?patient={{%Patient.id}}
sourceQueries:
  - reference: "#PatientConditionsBundle"
  - reference: "#PatientAllergiesBundle"
  - reference: "#PatientMedicationStatementsBundle"
  - reference: "#PatientImmunizationsBundle"
  - reference: "#PatientProceduresBundle"
item:
  - linkId: author-id
    text: Author ID
    type: string
    hidden: true
    initialExpression:
      language: text/fhirpath
      expression: "%Author.id"

  - linkId: author-resource-type
    text: Author Resource Type
    type: string
    hidden: true
    initialExpression:
      language: text/fhirpath
      expression: "%Author.resourceType"

  - linkId: sections-vertical-wizard-group
    type: group
    itemControl:
      coding:
        - code: wizard-vertical
    item:
      - linkId: summary-section
        text: Summary
        type: group
        item:
          - linkId: encounter-summary
            type: display
            itemControl:
              coding:
                - code: markdown
            _text:
              cqfExpression:
                language: text/fhirpath
                expression: >-
                  iif(
                    (
                      %resource.repeat(item).where(linkId='problems-summary').first().answer.valueString.exists()
                      or %resource.repeat(item).where(linkId='allergies-summary').first().answer.valueString.exists()
                      or %resource.repeat(item).where(linkId='social-history-summary').first().answer.valueString.exists()
                      or %resource.repeat(item).where(linkId='procedures-summary').first().answer.valueString.exists()
                      or %resource.repeat(item).where(linkId='medications-summary').first().answer.valueString.exists()
                      or %resource.repeat(item).where(linkId='immunizations-summary').first().answer.valueString.exists()
                      or %resource.repeat(item).where(linkId='vital-signs-summary').first().answer.valueString.exists()
                    ),
                    (
                      iif(
                        %resource.repeat(item).where(linkId='problems-summary').first().answer.valueString.exists(),
                        '## Problems' & '\n\n' & %resource.repeat(item).where(linkId='problems-summary').first().answer.valueString.first(),
                        ''
                      )
                      |
                      iif(
                        %resource.repeat(item).where(linkId='allergies-summary').first().answer.valueString.exists(),
                        '## Allergies & Intolerances' & '\n\n' & %resource.repeat(item).where(linkId='allergies-summary').first().answer.valueString.first(),
                        ''
                      )
                      |
                      iif(
                        %resource.repeat(item).where(linkId='social-history-summary').first().answer.valueString.exists(),
                        '## Social History' & '\n\n' & %resource.repeat(item).where(linkId='social-history-summary').first().answer.valueString.first(),
                        ''
                      )
                      |
                      iif(
                        %resource.repeat(item).where(linkId='procedures-summary').first().answer.valueString.exists(),
                        '## Procedures' & '\n\n' & %resource.repeat(item).where(linkId='procedures-summary').first().answer.valueString.first(),
                        ''
                      )
                      |
                      iif(
                        %resource.repeat(item).where(linkId='medications-summary').first().answer.valueString.exists(),
                        '## Medications' & '\n\n' & %resource.repeat(item).where(linkId='medications-summary').first().answer.valueString.first(),
                        ''
                      )
                      |
                      iif(
                        %resource.repeat(item).where(linkId='immunizations-summary').first().answer.valueString.exists(),
                        '## Immunizations' & '\n\n' & %resource.repeat(item).where(linkId='immunizations-summary').first().answer.valueString.first(),
                        ''
                      )
                      |
                      iif(
                        %resource.repeat(item).where(linkId='vital-signs-summary').first().answer.valueString.exists(),
                        '## Vital Signs' & '\n\n' & %resource.repeat(item).where(linkId='vital-signs-summary').first().answer.valueString.first(),
                        ''
                      )
                    ).where($this != '').join('\n\n\n'),
                    'No summary sections completed yet.'
                  )

      - linkId: patient-information
        text: Patient Information
        type: group
        item:
          - linkId: patient-id
            text: Patient ID
            type: string
            hidden: true
            initialExpression:
              language: text/fhirpath
              expression: "%Patient.id"

          - linkId: patient-name
            text: Name
            type: string
            readOnly: true
            initialExpression:
              language: text/fhirpath
              expression: "%Patient.name.first().given.first() + ' ' + %Patient.name.first().family"

          - linkId: patient-medicare-number
            text: Medicare Number
            type: string
            readOnly: true
            initialExpression:
              language: text/fhirpath
              expression: "%Patient.identifier.where(system='http://ns.electronichealth.net.au/id/medicare-number').first().value"

          - linkId: patient-gender
            text: Gender
            type: string
            readOnly: true
            initialExpression:
              language: text/fhirpath
              expression: "%Patient.gender"

          - linkId: patient-birthDate
            text: Birth Date
            type: date
            readOnly: true
            initialExpression:
              language: text/fhirpath
              expression: "%Patient.birthDate"
          
      - linkId: problems-section
        text: Problems
        type: group
        item:
          - linkId: problems
            text: Problem
            type: group
            repeats: true
            itemPopulationContext:
              language: text/fhirpath
              expression: "%PatientConditionsBundle.entry[0].resource.entry.resource"
              name: condition
            item:
              - linkId: condition-id
                text: Condition ID
                type: string
                required: false
                hidden: true
                initialExpression:
                  language: text/fhirpath
                  expression: "%context.id"

              - linkId: condition-code
                text: Problem or diagnosis
                type: choice
                entryFormat: Select problem or diagnosis
                required: true
                initialExpression:
                  language: text/fhirpath
                  expression: "%context.code.coding"
                answerValueSet: https://healthterminologies.gov.au/fhir/ValueSet/clinical-condition-1
                preferredTerminologyServer: https://tx.ontoserver.csiro.au/fhir

              - linkId: condition-onset-datetime
                text: Onset Date/Time
                helpText: "When the problem or diagnosis was first diagnosed?"
                type: dateTime
                initialExpression:
                  language: text/fhirpath
                  expression: "%context.onsetDateTime"
                
              - linkId: condition-clinical-status
                text: Clinical Status
                type: choice
                entryFormat: Select clinical status
                answerValueSet: http://hl7.org/fhir/ValueSet/condition-clinical
                preferredTerminologyServer: https://tx.ontoserver.csiro.au/fhir
                initialExpression:
                  language: text/fhirpath
                  expression: "%context.clinicalStatus.coding"

              - linkId: condition-abatement-datetime
                text: Abatement Date/Time
                helpText: "When the problem or diagnosis was resolved?"
                type: dateTime
                enableWhenExpression:
                  language: text/fhirpath
                  expression: |-
                    iif((%context.item.where(linkId='condition-clinical-status').answer.valueCoding.code.first() = 'inactive') or
                    (%context.item.where(linkId='condition-clinical-status').answer.valueCoding.code.first() = 'resolved') or
                    (%context.item.where(linkId='condition-clinical-status').answer.valueCoding.code.first() = 'remission'),
                    true, false)
                initialExpression:
                  language: text/fhirpath
                  expression: "%context.abatementDateTime"                  

              - linkId: condition-verification-status
                text: Verification Status
                type: choice
                entryFormat: Select verification status
                answerValueSet: http://hl7.org/fhir/ValueSet/condition-ver-status
                preferredTerminologyServer: https://tx.ontoserver.csiro.au/fhir
                initialExpression:
                  language: text/fhirpath
                  expression: "%context.verificationStatus.coding"

              - linkId: condition-category
                text: Category
                type: choice
                entryFormat: Select category
                required: true
                # TODO: initialExpression does not work for repeats: true
                # TODO: https://github.com/beda-software/fhir-sdc/issues/93
                repeats: false
                answerValueSet: http://hl7.org/fhir/ValueSet/condition-category
                preferredTerminologyServer: https://tx.ontoserver.csiro.au/fhir
                initialExpression:
                  language: text/fhirpath
                  expression: "%context.category.coding"

              - linkId: condition-severity
                text: Severity
                type: choice
                entryFormat: Select severity
                answerValueSet: http://hl7.org/fhir/ValueSet/condition-severity
                preferredTerminologyServer: https://tx.ontoserver.csiro.au/fhir
                initialExpression:
                  language: text/fhirpath
                  expression: "%context.severity.coding"
              
              - linkId: condition-notes
                text: Notes
                type: text
                initialExpression:
                  language: text/fhirpath
                  expression: "%context.note.text"
              
          - linkId: problems-summary
            text: Summary
            type: text
            calculatedExpression:
              language: text/fhirpath
              expression: >-
                %resource.repeat(item)
                  .where(linkId='problems')
                  .select(
                    iif(
                      repeat(item)
                        .where(linkId='condition-code')
                        .answer.valueCoding.exists(),
                      'Problem: '
                        & repeat(item)
                          .where(linkId='condition-code')
                          .answer.valueCoding.display.first()
                      & iif(
                        repeat(item)
                          .where(linkId='condition-category')
                          .answer.valueCoding.exists(),
                        '  \nCategory: '
                          & repeat(item)
                            .where(linkId='condition-category')
                            .answer.valueCoding.display.first(),
                        ''
                      )
                      & iif(
                        repeat(item)
                          .where(linkId='condition-clinical-status')
                          .answer.valueCoding.exists(),
                        '  \nClinical status: '
                          & repeat(item)
                            .where(linkId='condition-clinical-status')
                            .answer.valueCoding.display.first(),
                        ''
                      )
                      & iif(
                        repeat(item)
                          .where(linkId='condition-verification-status')
                          .answer.valueCoding.exists(),
                        '  \nVerification status: '
                          & repeat(item)
                            .where(linkId='condition-verification-status')
                            .answer.valueCoding.display.first(),
                        ''
                      )
                      & iif(
                        repeat(item)
                          .where(linkId='condition-severity')
                          .answer.valueCoding.exists(),
                        '  \nSeverity: '
                          & repeat(item)
                            .where(linkId='condition-severity')
                            .answer.valueCoding.display.first(),
                        ''
                      )
                      & iif(
                        repeat(item)
                          .where(linkId='condition-onset-datetime')
                          .answer.valueDateTime.exists(),
                        '  \nOnset: '
                          & repeat(item)
                            .where(linkId='condition-onset-datetime')
                            .answer.valueDateTime.first().toString(),
                        ''
                      )
                      & iif(
                        repeat(item)
                          .where(linkId='condition-abatement-datetime')
                          .answer.valueDateTime.exists(),
                        '\nAbatement: '
                          & repeat(item)
                            .where(linkId='condition-abatement-datetime')
                            .answer.valueDateTime.first().toString(),
                        ''
                      )
                      & iif(
                        repeat(item)
                          .where(linkId='condition-notes')
                          .answer.valueString.exists(),
                        '  \n\nNotes: '
                          & repeat(item)
                            .where(linkId='condition-notes')
                            .answer.valueString.first(),
                        ''
                      ),
                      ''
                    )
                  )
                  .where($this != '')
                  .join('\n\n\n')

          - linkId: allergies-summary
            text: Summary
            type: text
            calculatedExpression:
              language: text/fhirpath
              expression: >-
                %resource.repeat(item)
                  .where(linkId='allergies')
                  .select(
                    iif(
                      repeat(item)
                        .where(linkId='allergy-code')
                        .answer.valueCoding.exists(),
                      'Allergy: '
                        & repeat(item)
                          .where(linkId='allergy-code')
                          .answer.valueCoding.display.first()
                      & iif(
                        repeat(item)
                          .where(linkId='allergy-type')
                          .answer.valueCoding.exists(),
                        '  \nType: '
                          & repeat(item)
                            .where(linkId='allergy-type')
                            .answer.valueCoding.display.first(),
                        ''
                      )
                      & iif(
                        repeat(item)
                          .where(linkId='allergy-clinical-status')
                          .answer.valueCoding.exists(),
                        '  \nClinical status: '
                          & repeat(item)
                            .where(linkId='allergy-clinical-status')
                            .answer.valueCoding.display.first(),
                        ''
                      )
                      & iif(
                        repeat(item)
                          .where(linkId='allergy-verification-status')
                          .answer.valueCoding.exists(),
                        '  \nVerification status: '
                          & repeat(item)
                            .where(linkId='allergy-verification-status')
                            .answer.valueCoding.display.first(),
                        ''
                      )
                      & iif(
                        repeat(item)
                          .where(linkId='allergy-onset-datetime')
                          .answer.valueDateTime.exists(),
                        '  \nOnset: '
                          & repeat(item)
                            .where(linkId='allergy-onset-datetime')
                            .answer.valueDateTime.first().toString(),
                        ''
                      )
                      & iif(
                        repeat(item)
                          .where(linkId='allergy-reaction-group')
                          .answer.exists(),
                        '  \nReactions: '
                          & repeat(item)
                            .where(linkId='allergy-reaction-group')
                            .select(
                              repeat(item)
                                .where(linkId='allergy-manifestation')
                                .answer.valueCoding.display.first()
                              & iif(
                                repeat(item)
                                  .where(linkId='allergy-severity')
                                  .answer.valueCoding.exists(),
                                ' ('
                                  & repeat(item)
                                    .where(linkId='allergy-severity')
                                    .answer.valueCoding.display.first()
                                  & ')',
                                ''
                              )
                            )
                            .where($this.exists())
                            .join(', '),
                        ''
                      )
                      & iif(
                        repeat(item)
                          .where(linkId='allergy-notes')
                          .answer.valueString.exists(),
                        '  \n\nNotes: '
                          & repeat(item)
                            .where(linkId='allergy-notes')
                            .answer.valueString.first(),
                        ''
                      ),
                      ''
                    )
                  )
                  .where($this != '')
                  .join('\n\n\n')

      - linkId: medications-section
        text: Medications
        type: group
        item:
          - linkId: medications
            text: Medication
            type: group
            repeats: true
            itemPopulationContext:
              language: text/fhirpath
              expression: "%PatientMedicationStatementsBundle.entry[0].resource.entry.resource"
              name: medication
            item:
              - linkId: medication-statement-id
                text: Medication Statement ID
                type: string
                hidden: true
                initialExpression:
                  language: text/fhirpath
                  expression: "%context.id"

              - linkId: medication-pbs-code
                text: PBS Code
                type: choice
                # answerValueSet: http://terminology.hl7.org.au/ValueSet/pbs-item
                # preferredTerminologyServer: http://pbs.gov.au/
                # No Expansion for this valueset                  
                entryFormat: Select PBS item
                initialExpression:
                  language: text/fhirpath
                  expression: |-
                    %Questionnaire.repeat(item)
                      .where(linkId='medication-pbs-code')
                      .answerOption.valueCoding.where(
                        code = %context.medicationCodeableConcept.coding
                          .where(system = 'http://pbs.gov.au/code/item')
                          .code.first()
                      )
                answerOption:
                  - valueCoding:
                      system: http://pbs.gov.au/code/item
                      code: "10001J"
                      display: "10001J - Rifaximin"
                  - valueCoding:
                      system: http://pbs.gov.au/code/item
                      code: "10003L"
                      display: "10003L - Dabrafenib"
                  - valueCoding:
                      system: http://pbs.gov.au/code/item
                      code: "10004M"
                      display: "10004M - Sunitinib"
                  - valueCoding:
                      system: http://pbs.gov.au/code/item
                      code: "10005N"
                      display: "10005N - Olmesartan + amlodipine + hydrochlorothiazide"
                  - valueCoding:
                      system: http://pbs.gov.au/code/item
                      code: "10007Q"
                      display: "10007Q - fluticasone propionate + formoterol"
                  - valueCoding:
                      system: http://pbs.gov.au/code/item
                      code: "10008R"
                      display: "10008R - fluticasone propionate + formoterol"
                  - valueCoding:
                      system: http://pbs.gov.au/code/item
                      code: "10009T"
                      display: "10009T - Sunitinib"
                  - valueCoding:
                      system: http://pbs.gov.au/code/item
                      code: "10010W"
                      display: "10010W - Sunitinib"
                  - valueCoding:
                      system: http://pbs.gov.au/code/item
                      code: "10011X"
                      display: "10011X - Sunitinib"
                  - valueCoding:
                      system: http://pbs.gov.au/code/item
                      code: "10012Y"
                      display: "10012Y - Dapagliflozin"
                  - valueCoding:
                      system: http://pbs.gov.au/code/item
                      code: "10014C"
                      display: "10014C - Ivabradine"
                  - valueCoding:
                      system: http://pbs.gov.au/code/item
                      code: "10015D"
                      display: "10015D - Ivabradine"
                  - valueCoding:
                      system: http://pbs.gov.au/code/item
                      code: "10017F"
                      display: "10017F - Erlotinib"
                  - valueCoding:
                      system: http://pbs.gov.au/code/item
                      code: "10018G"
                      display: "10018G - Budesonide + formoterol"

              - linkId: medication-amt-code
                text: AMT Code
                type: choice
                entryFormat: Select AMT code
                initialExpression:
                  language: text/fhirpath
                  expression: |-
                    %context.medicationCodeableConcept.coding
                      .where(system = 'http://snomed.info/sct')
                answerValueSet: https://healthterminologies.gov.au/fhir/ValueSet/australian-medication-1
                preferredTerminologyServer: https://tx.ontoserver.csiro.au/fhir
                choiceColumn:
                  - path: code + ' - ' + display
                    forDisplay: true
                    
              - linkId: medication-effective-datetime
                text: Effective Date/Time
                helpText: "When the medication is/was/will be taken?"
                type: dateTime
                required: true
                initialExpression:
                  language: text/fhirpath
                  expression: "%context.effectiveDateTime"

              - linkId: medication-status
                text: Status
                type: choice
                entryFormat: Select status
                initialExpression:
                  language: text/fhirpath
                  expression: >-
                    %Questionnaire.repeat(item).where(linkId='medication-status').answerOption.valueCoding.where(code=%context.status)
                answerOption:
                  - valueCoding:
                      system: http://hl7.org/fhir/CodeSystem/medication-statement-status
                      code: active
                      display: Active
                  - valueCoding:
                      system: http://hl7.org/fhir/CodeSystem/medication-statement-status
                      code: completed
                      display: Completed
                  - valueCoding:
                      system: http://hl7.org/fhir/CodeSystem/medication-statement-status
                      code: entered-in-error
                      display: Entered in Error
                  - valueCoding:
                      system: http://hl7.org/fhir/CodeSystem/medication-statement-status
                      code: intended
                      display: Intended
                  - valueCoding:
                      system: http://hl7.org/fhir/CodeSystem/medication-statement-status
                      code: stopped
                      display: Stopped
                  - valueCoding:
                      system: http://hl7.org/fhir/CodeSystem/medication-statement-status
                      code: on-hold
                      display: On Hold
                  - valueCoding:
                      system: http://hl7.org/fhir/CodeSystem/medication-statement-status
                      code: unknown
                      display: Unknown
                  - valueCoding:
                      system: http://hl7.org/fhir/CodeSystem/medication-statement-status
                      code: not-taken
                      display: Not Taken

              - linkId: medication-asserted-datetime
                text: Asserted Date/Time
                helpText: "When the statement was asserted?"
                type: dateTime
                initialExpression:
                  language: text/fhirpath
                  expression: "%context.dateAsserted"

              - linkId: medication-reason
                text: Reason
                type: choice
                entryFormat: Select reason
                initialExpression:
                  language: text/fhirpath
                  expression: "%context.reasonCode.coding"
                answerValueSet: https://healthterminologies.gov.au/fhir/ValueSet/medication-reason-taken-1|1.1.0
                preferredTerminologyServer: https://tx.ontoserver.csiro.au/fhir

              - linkId: medication-dosage
                text: Dosage
                type: group
                repeats: true
                itemPopulationContext:
                  language: text/fhirpath
                  expression: "%context.dosage"
                item:
                  - linkId: medication-dosage-amount
                    text: Amount
                    type: string
                    entryFormat: Enter amount
                    initialExpression:
                      language: text/fhirpath
                      expression: "%context.text"
          
          - linkId: medications-summary
            text: Summary
            type: text
            calculatedExpression:
              language: text/fhirpath
              expression: >-
                %resource.repeat(item)
                  .where(linkId='medications')
                  .select(
                    iif(
                      repeat(item)
                        .where(linkId='medication-amt-code')
                        .answer.valueCoding.exists()
                      or
                      repeat(item)
                        .where(linkId='medication-pbs-code')
                        .answer.valueCoding.exists(),
                      'Medication: '
                        &
                        iif(
                          repeat(item)
                            .where(linkId='medication-amt-code')
                            .answer.valueCoding.exists(),
                          repeat(item)
                            .where(linkId='medication-amt-code')
                            .answer.valueCoding.display.first(),
                          ''
                        )
                        &
                        iif(
                          repeat(item)
                            .where(linkId='medication-amt-code')
                            .answer.valueCoding.exists()
                          and
                          repeat(item)
                            .where(linkId='medication-pbs-code')
                            .answer.valueCoding.exists(),
                          ' • ',
                          ''
                        )
                        &
                        iif(
                          repeat(item)
                            .where(linkId='medication-pbs-code')
                            .answer.valueCoding.exists(),
                          repeat(item)
                            .where(linkId='medication-pbs-code')
                            .answer.valueCoding.display.first(),
                          ''
                        )
                        & iif(
                          repeat(item)
                            .where(linkId='medication-amt-code')
                            .answer.valueCoding.exists()
                          or
                          repeat(item)
                            .where(linkId='medication-pbs-code')
                            .answer.valueCoding.exists(),
                          '  \nCodes: '
                            &
                            iif(
                              repeat(item)
                                .where(linkId='medication-amt-code')
                                .answer.valueCoding.exists(),
                              'AMT '
                                &
                                repeat(item)
                                  .where(linkId='medication-amt-code')
                                  .answer.valueCoding.code.first(),
                              ''
                            )
                            &
                            iif(
                              repeat(item)
                                .where(linkId='medication-amt-code')
                                .answer.valueCoding.exists()
                              and
                              repeat(item)
                                .where(linkId='medication-pbs-code')
                                .answer.valueCoding.exists(),
                              ' • ',
                              ''
                            )
                            &
                            iif(
                              repeat(item)
                                .where(linkId='medication-pbs-code')
                                .answer.valueCoding.exists(),
                              'PBS '
                                &
                                repeat(item)
                                  .where(linkId='medication-pbs-code')
                                  .answer.valueCoding.code.first()
                                & ' ('
                                & repeat(item)
                                  .where(linkId='medication-pbs-code')
                                  .answer.valueCoding.display.first()
                                & ')',
                              ''
                            ),
                          ''
                        )
                        & iif(
                          repeat(item)
                            .where(linkId='medication-status')
                            .answer.valueCoding.exists(),
                          '  \nStatus: '
                            &
                            repeat(item)
                              .where(linkId='medication-status')
                              .answer.valueCoding.display.first(),
                          ''
                        )
                        & '  \nEffective: '
                        &
                        repeat(item)
                          .where(linkId='medication-effective-datetime')
                          .answer.valueDateTime.first()
                          .toString()
                        & '  \nAsserted: '
                        &
                        repeat(item)
                          .where(linkId='medication-asserted-datetime')
                          .answer.valueDateTime.first()
                          .toString()
                        & iif(
                          repeat(item)
                            .where(linkId='medication-reason')
                            .answer.valueCoding.exists(),
                          '  \nReason: '
                            &
                            repeat(item)
                              .where(linkId='medication-reason')
                              .answer.valueCoding.display.first(),
                          ''
                        )
                        &
                        iif(
                          repeat(item)
                            .where(linkId='medication-dosage')
                            .select(
                              repeat(item)
                                .where(linkId='medication-dosage-amount')
                                .answer.valueString
                            )
                            .where($this != '')
                            .exists(),
                          '  \nDosage: '
                            &
                            repeat(item)
                              .where(linkId='medication-dosage')
                              .select(
                                repeat(item)
                                  .where(linkId='medication-dosage-amount')
                                  .answer.valueString
                              )
                              .where($this != '')
                              .join('; '),
                          ''
                        ),
                      ''
                    )
                  )
                  .where($this != '')
                  .join('\n\n\n')

      - linkId: immunizations-section
        text: Immunizations
        type: group
        item:
          - linkId: immunizations
            text: Immunization
            type: group
            repeats: true
            itemPopulationContext:
              language: text/fhirpath
              expression: "%PatientImmunizationsBundle.entry[0].resource.entry.resource"
              name: immunization
            item:
              - linkId: immunization-id
                text: Immunization ID
                type: string
                hidden: true
                initialExpression:
                  language: text/fhirpath
                  expression: "%context.id"

              - linkId: immunization-vaccine-amt-code
                text: AMT Code
                type: choice
                entryFormat: Select AMT code
                answerValueSet: https://healthterminologies.gov.au/fhir/ValueSet/amt-vaccine-1
                preferredTerminologyServer: https://tx.ontoserver.csiro.au/fhir
                initialExpression:
                  language: text/fhirpath
                  expression: "%context.vaccineCode.coding.where(system='http://snomed.info/sct').first()"

              - linkId: immunization-vaccine-air-code
                text: AIR Code
                type: choice
                entryFormat: Select AIR code
                answerValueSet: https://healthterminologies.gov.au/fhir/ValueSet/australian-immunisation-register-vaccine-1
                preferredTerminologyServer: https://tx.ontoserver.csiro.au/fhir
                initialExpression:
                  language: text/fhirpath
                  expression: "%context.vaccineCode.coding.where(system='https://www.humanservices.gov.au/organisations/health-professionals/enablers/air-vaccine-code-formats').first()"

              - linkId: immunization-occurrence-datetime
                text: Occurrence Date/Time
                helpText: "The date/time when the immunization is/was/will be administered"
                required: true
                type: dateTime
                initialExpression:
                  language: text/fhirpath
                  expression: "%context.occurrenceDateTime"

              - linkId: immunization-status
                text: Status
                type: choice
                entryFormat: Select status
                required: true
                answerOption:
                  - valueCoding:
                      system: http://hl7.org/fhir/event-status
                      code: completed
                      display: Completed
                  - valueCoding:
                      system: http://hl7.org/fhir/event-status
                      code: entered-in-error
                      display: Entered in Error
                  - valueCoding:
                      system: http://hl7.org/fhir/event-status
                      code: not-done
                      display: Not Done
                initialExpression:
                  language: text/fhirpath
                  expression: "%Questionnaire.repeat(item).where(linkId='immunization-status').answerOption.valueCoding.where(code=%context.status).first()"

              - linkId: immunization-primary-source
                text: Primary Source
                type: boolean
                helpText: "Indicates whether the data was recorded by the provider who administered the vaccine"
                initialExpression:
                  language: text/fhirpath
                  expression: "%context.primarySource"

              - linkId: immunization-lot-number
                text: Vaccine Lot Number
                type: string
                entryFormat: Enter lot number
                initialExpression:
                  language: text/fhirpath
                  expression: "%context.lotNumber"

              - linkId: immunization-notes
                text: Notes
                type: text
                initialExpression:
                  language: text/fhirpath
                  expression: "%context.note.first().text"

          - linkId: immunizations-summary
            text: Summary
            type: text
            calculatedExpression:
              language: text/fhirpath
              expression: >-
                %resource.repeat(item)
                  .where(linkId='immunizations')
                  .select(
                    iif(
                      repeat(item)
                        .where(linkId='immunization-vaccine-amt-code')
                        .answer.valueCoding.exists()
                      or
                      repeat(item)
                        .where(linkId='immunization-vaccine-air-code')
                        .answer.valueCoding.exists()
                      or
                      repeat(item)
                        .where(linkId='immunization-status')
                        .answer.valueCoding.exists()
                      or
                      repeat(item)
                        .where(linkId='immunization-occurrence-datetime')
                        .answer.valueDateTime.exists()
                      or
                      repeat(item)
                        .where(linkId='immunization-primary-source')
                        .answer.valueBoolean.exists()
                      or
                      repeat(item)
                        .where(linkId='immunization-lot-number')
                        .answer.valueString.exists()
                      or
                      repeat(item)
                        .where(linkId='immunization-notes')
                        .answer.valueString.exists(),
                      iif(
                        repeat(item)
                          .where(linkId='immunization-vaccine-amt-code')
                          .answer.valueCoding.exists(),
                        'AMT Code: '
                          & repeat(item)
                            .where(linkId='immunization-vaccine-amt-code')
                            .answer.valueCoding.display.first()
                          & '  \n',
                        ''
                      )
                      & iif(
                        repeat(item)
                          .where(linkId='immunization-vaccine-air-code')
                          .answer.valueCoding.exists(),
                        'AIR Code: '
                          & repeat(item)
                            .where(linkId='immunization-vaccine-air-code')
                            .answer.valueCoding.display.first()
                          & '  \n',
                        ''
                      )
                      & iif(
                        repeat(item)
                          .where(linkId='immunization-status')
                          .answer.valueCoding.exists(),
                        'Status: '
                          & repeat(item)
                            .where(linkId='immunization-status')
                            .answer.valueCoding.display.first()
                          & '  \n',
                        ''
                      )
                      & iif(
                        repeat(item)
                          .where(linkId='immunization-occurrence-datetime')
                          .answer.valueDateTime.exists(),
                        'Occurred: '
                          & repeat(item)
                            .where(linkId='immunization-occurrence-datetime')
                            .answer.valueDateTime.first()
                            .toString()
                          & '  \n',
                        ''
                      )
                      & iif(
                        repeat(item)
                          .where(linkId='immunization-primary-source')
                          .answer.valueBoolean.exists(),
                        'Source: '
                          & iif(
                            repeat(item)
                              .where(linkId='immunization-primary-source')
                              .answer.valueBoolean.first(),
                            'Primary',
                            'Not primary'
                          )
                          & '  \n',
                        ''
                      )
                      & iif(
                        repeat(item)
                          .where(linkId='immunization-lot-number')
                          .answer.valueString.exists(),
                        'Lot: '
                          & repeat(item)
                            .where(linkId='immunization-lot-number')
                            .answer.valueString.first()
                          & '  \n',
                        ''
                      )
                      & iif(
                        repeat(item)
                          .where(linkId='immunization-notes')
                          .answer.valueString.exists(),
                        '\nNotes: '
                          & repeat(item)
                            .where(linkId='immunization-notes')
                            .answer.valueString.first(),
                        ''
                      ),
                      ''
                    )
                  )
                  .where($this != '')
                  .join('\n\n')                  

      - linkId: procedures-section
        text: Procedures
        type: group
        item:
          - linkId: procedures
            text: Procedure
            type: group
            repeats: true
            itemPopulationContext:
              language: text/fhirpath
              expression: "%PatientProceduresBundle.entry[0].resource.entry.resource"
              name: procedure
            item:
              - linkId: procedure-id
                text: Procedure ID
                type: string
                hidden: true
                initialExpression:
                  language: text/fhirpath
                  expression: "%context.id"
                  
              - linkId: procedure-code
                text: Procedure
                type: choice
                entryFormat: Select procedure
                required: true
                initialExpression:
                  language: text/fhirpath
                  expression: "%context.code.coding"
                answerValueSet: https://healthterminologies.gov.au/fhir/ValueSet/procedure-1
                preferredTerminologyServer: https://tx.ontoserver.csiro.au/fhir

              - linkId: procedure-performed-datetime
                required: true
                text: Performed Date/Time
                helpText: "The date/time when the procedure is/was/will be performed"
                type: dateTime
                initialExpression:
                  language: text/fhirpath
                  expression: "%context.performedDateTime | %context.performedPeriod.start"

              - linkId: procedure-status
                text: Status
                type: choice
                entryFormat: Select status
                required: true
                answerOption:
                  - valueCoding:
                      system: http://hl7.org/fhir/event-status
                      code: preparation
                      display: Preparation
                  - valueCoding:
                      system: http://hl7.org/fhir/event-status
                      code: in-progress
                      display: In Progress
                  - valueCoding:
                      system: http://hl7.org/fhir/event-status
                      code: not-done
                      display: Not Done
                  - valueCoding:
                      system: http://hl7.org/fhir/event-status
                      code: on-hold
                      display: On Hold
                  - valueCoding:
                      system: http://hl7.org/fhir/event-status
                      code: stopped
                      display: Stopped
                  - valueCoding:
                      system: http://hl7.org/fhir/event-status
                      code: completed
                      display: Completed
                  - valueCoding:
                      system: http://hl7.org/fhir/event-status
                      code: entered-in-error
                      display: Entered in Error
                  - valueCoding:
                      system: http://hl7.org/fhir/event-status
                      code: unknown
                      display: Unknown
                initialExpression:
                  language: text/fhirpath
                  expression: "%Questionnaire.repeat(item).where(linkId='procedure-status').answerOption.valueCoding.where(code=%context.status)"
              
              - linkId: procedure-reason
                text: Reason for procedure
                type: choice
                initialExpression:
                  language: text/fhirpath
                  expression: "%context.reasonCode.coding"
                answerValueSet: http://hl7.org/fhir/ValueSet/procedure-reason
                preferredTerminologyServer: https://tx.ontoserver.csiro.au/fhir

          - linkId: procedures-summary
            text: Summary
            type: text
            calculatedExpression:
              language: text/fhirpath
              expression: >-
                %resource.repeat(item)
                  .where(linkId='procedures')
                  .select(
                    iif(
                      repeat(item)
                        .where(linkId='procedure-code')
                        .answer.valueCoding.exists(),
                      'Procedure: '
                        & repeat(item)
                          .where(linkId='procedure-code')
                          .answer.valueCoding.display.first()
                      & iif(
                        repeat(item)
                          .where(linkId='procedure-status')
                          .answer.valueCoding.exists(),
                        '  \nStatus: '
                          & repeat(item)
                            .where(linkId='procedure-status')
                            .answer.valueCoding.display.first(),
                        ''
                      )
                      & iif(
                        repeat(item)
                          .where(linkId='procedure-performed-datetime')
                          .answer.valueDateTime.exists(),
                        '  \nPerformed: '
                          & repeat(item)
                            .where(linkId='procedure-performed-datetime')
                            .answer.valueDateTime.first().toString(),
                        ''
                      )
                      & iif(
                        repeat(item)
                          .where(linkId='procedure-reason')
                          .answer.valueCoding.exists(),
                        '  \n\nReason:  \n'
                          & repeat(item)
                            .where(linkId='procedure-reason')
                            .answer.valueCoding.display.first(),
                        ''
                      ),
                      ''
                    )
                  )
                  .where($this != '')
                  .join('\n\n\n')

      - linkId: document-section
        text: Document
        type: group
        item:
          - linkId: composition-title
            text: Document Title
            type: string
            initialExpression:
              language: text/fhirpath
              expression: "%Patient.name.first().given.first() + ' ' + %Patient.name.first().family + ' AUPS document'"

          - linkId: composition-date
            text: Document Date
            type: dateTime
            initialExpression:
              language: text/fhirpath
              expression: "now()"
