resourceType: Questionnaire
id: discharge-summary
url: discharge-summary
status: active
meta:
  profile:
    - https://emr-core.beda.software/StructureDefinition/fhir-emr-questionnaire
title: Discharge Summary
name: discharge-summary
mapping:
  - reference: urn:uuid:Mapping:discharge-summary-extract
subjectType:
  - Patient
launchContext:
  - name:
      code: Patient
    type:
      - Patient
  - name:
      code: Author
    type:
      - Practitioner
      - Organization
contained:
  - resourceType: Bundle
    id: PatientAllergiesBundle
    type: transaction
    entry:
      - request:
          method: GET
          url: /AllergyIntolerance?patient={{%Patient.id}}
  - resourceType: Bundle
    id: PatientMedicationStatementsBundle
    type: transaction
    entry:
      - request:
          method: GET
          url: /MedicationStatement?subject={{%Patient.id}}
  - resourceType: Bundle
    id: PatientImmunizationsBundle
    type: transaction
    entry:
      - request:
          method: GET
          url: /Immunization?patient={{%Patient.id}}
  - resourceType: Bundle
    id: SocialHistoryBundle
    type: transaction
    entry:
      - request:
          method: GET
          url: /Observation?patient={{%Patient.id}}&category=http://terminology.hl7.org/CodeSystem/observation-category|social-history&_sort=-_lastUpdated
  - resourceType: Bundle
    id: VitalSignsBundle
    type: transaction
    entry:
      - request:
          method: GET
          url: /Observation?patient={{%Patient.id}}&category=http://terminology.hl7.org/CodeSystem/observation-category|vital-signs&_sort=-_lastUpdated 
sourceQueries:
  - reference: "#PatientAllergiesBundle"
  - reference: "#PatientMedicationStatementsBundle"
  - reference: "#PatientImmunizationsBundle"
  - reference: "#SocialHistoryBundle"
  - reference: "#VitalSignsBundle"
item:
  - linkId: author-id
    text: Author ID
    type: string
    hidden: true
    initialExpression:
      language: text/fhirpath
      expression: "%Author.id"

  - linkId: author-resource-type
    text: Author Resource Type
    type: string
    hidden: true
    initialExpression:
      language: text/fhirpath
      expression: "%Author.resourceType"

  - linkId: sections-vertical-wizard-group
    type: group
    itemControl:
      coding:
        - code: wizard-vertical
    item:
      - linkId: encounter-section
        text: Encounter
        type: group
        item:
          - linkId: encounter-id
            text: Encounter ID
            type: string
            required: false
            hidden: true

          - linkId: encounter-class
            text: Class
            type: choice
            entryFormat: Select class
            required: true
            answerValueSet: http://terminology.hl7.org.au/ValueSet/v3-ActEncounterCode-extended
            preferredTerminologyServer: https://tx.ontoserver.csiro.au/fhir
            initialExpression:
              language: text/fhirpath
              expression: "%context.class.coding"

          - linkId: encounter-service-type
            text: Service Type
            type: choice
            entryFormat: Select service type
            answerValueSet: https://healthterminologies.gov.au/fhir/ValueSet/service-type-1
            preferredTerminologyServer: https://tx.ontoserver.csiro.au/fhir
            initialExpression:
              language: text/fhirpath
              expression: "%context.period.start"

          - linkId: encounter-period-start
            text: Start Date
            type: dateTime
            initialExpression:
              language: text/fhirpath
              expression: "%context.period.end"

          - linkId: encounter-period-end
            text: End Date
            type: dateTime
            initialExpression:
              language: text/fhirpath
              expression: "%context.period.start"

          - linkId: encounter-status
            text: Status
            type: choice
            required: true
            entryFormat: Select status
            answerValueSet: http://hl7.org/fhir/ValueSet/encounter-status
            preferredTerminologyServer: https://tx.ontoserver.csiro.au/fhir
            initialExpression:
              language: text/fhirpath
              expression: "%context.reason.coding"

          - linkId: encounter-reason-code
            text: Reason for Encounter
            type: choice
            entryFormat: Select reason for encounter
            answerValueSet: https://healthterminologies.gov.au/fhir/ValueSet/reason-for-encounter-1
            preferredTerminologyServer: https://tx.ontoserver.csiro.au/fhir
            initialExpression:
              language: text/fhirpath
              expression: "%context.reason.coding"

          - linkId: encounter-location
            text: Location
            type: reference
            entryFormat: Select location
            answerExpression:
              language: application/x-fhir-query
              expression: "Location?status=active"
            referenceResource:
              - Location
            choiceColumn:
              - forDisplay: true
                path: name

          - linkId: encounter-participant
            text: Participant
            type: group
            repeats: true
            itemPopulationContext:
              language: text/fhirpath
              expression: "%context.participant"
            item:
              - linkId: encounter-participant-role
                text: Role
                type: choice
                entryFormat: Select role
                answerValueSet: http://hl7.org/fhir/ValueSet/encounter-participant-type
                preferredTerminologyServer: https://tx.ontoserver.csiro.au/fhir
                initialExpression:
                  language: text/fhirpath
                  expression: "%context.type.coding"

              - linkId: encounter-participant-individual
                text: Doctor
                type: reference
                entryFormat: Select doctor
                initialExpression:
                  language: text/fhirpath
                  expression: "%context.individual"
                answerExpression:
                  language: application/x-fhir-query
                  expression: "Practitioner?status=active"
                referenceResource:
                  - Practitioner
                choiceColumn:
                  - forDisplay: true
                    path: name.given.first() + ' ' + name.family

              - linkId: encounter-service-provider
                text: Service Provider
                type: reference
                entryFormat: Select service provider
                required: true
                initialExpression:
                  language: text/fhirpath
                  expression: "%Encounter.serviceProvider"
                answerExpression:
                  language: application/x-fhir-query
                  expression: "Organization?status=active"
                referenceResource:
                  - Organization
                choiceColumn:
                  - forDisplay: true
                    path: name

      - linkId: problems-section
        text: Problems
        type: group
        item:
          - linkId: problems
            text: Problem
            type: group
            repeats: true
            item:
              - linkId: condition-id
                text: Condition ID
                type: string
                required: false
                hidden: true
                initialExpression:
                  language: text/fhirpath
                  expression: "%context.id"

              - linkId: condition-code
                text: Problem or diagnosis
                type: choice
                entryFormat: Select problem or diagnosis
                required: true
                answerValueSet: https://healthterminologies.gov.au/fhir/ValueSet/clinical-condition-1
                preferredTerminologyServer: https://tx.ontoserver.csiro.au/fhir

              - linkId: condition-onset-datetime
                text: Onset Date/Time
                helpText: "When the problem or diagnosis was first diagnosed?"
                type: dateTime
                
              - linkId: condition-clinical-status
                text: Clinical Status
                type: choice
                entryFormat: Select clinical status
                answerValueSet: http://hl7.org/fhir/ValueSet/condition-clinical
                preferredTerminologyServer: https://tx.ontoserver.csiro.au/fhir

              - linkId: condition-abatement-datetime
                text: Abatement Date/Time
                helpText: "When the problem or diagnosis was resolved?"
                type: dateTime
                enableWhenExpression:
                  language: text/fhirpath
                  expression: |-
                    iif((%context.item.where(linkId='condition-clinical-status').answer.valueCoding.code.first() = 'inactive') or
                    (%context.item.where(linkId='condition-clinical-status').answer.valueCoding.code.first() = 'resolved') or
                    (%context.item.where(linkId='condition-clinical-status').answer.valueCoding.code.first() = 'remission'),
                    true, false)                  

              - linkId: condition-verification-status
                text: Verification Status
                type: choice
                entryFormat: Select verification status
                answerValueSet: http://hl7.org/fhir/ValueSet/condition-ver-status
                preferredTerminologyServer: https://tx.ontoserver.csiro.au/fhir

              - linkId: condition-category
                text: Category
                type: choice
                entryFormat: Select category
                required: true
                # TODO: initialExpression does not work for repeats: true
                # TODO: https://github.com/beda-software/fhir-sdc/issues/93
                repeats: false
                answerValueSet: http://hl7.org/fhir/ValueSet/condition-category
                preferredTerminologyServer: https://tx.ontoserver.csiro.au/fhir

              - linkId: condition-severity
                text: Severity
                type: choice
                entryFormat: Select severity
                answerValueSet: http://hl7.org/fhir/ValueSet/condition-severity
                preferredTerminologyServer: https://tx.ontoserver.csiro.au/fhir
              
              - linkId: condition-notes
                text: Notes
                type: text
                entryFormat: Write here
              
          - linkId: problems-summary
            text: Summary
            type: text
            readOnly: true
            calculatedExpression:
              language: text/fhirpath
              expression: >-
                %resource.repeat(item)
                  .where(linkId='problems')
                  .select(
                    iif(
                      repeat(item)
                        .where(linkId='condition-code')
                        .answer.valueCoding.exists(),
                      'Problem: '
                        & repeat(item)
                          .where(linkId='condition-code')
                          .answer.valueCoding.display.first()
                      & iif(
                        repeat(item)
                          .where(linkId='condition-category')
                          .answer.valueCoding.exists(),
                        '  \nCategory: '
                          & repeat(item)
                            .where(linkId='condition-category')
                            .answer.valueCoding.display.first(),
                        ''
                      )
                      & iif(
                        repeat(item)
                          .where(linkId='condition-clinical-status')
                          .answer.valueCoding.exists(),
                        '  \nClinical status: '
                          & repeat(item)
                            .where(linkId='condition-clinical-status')
                            .answer.valueCoding.display.first(),
                        ''
                      )
                      & iif(
                        repeat(item)
                          .where(linkId='condition-verification-status')
                          .answer.valueCoding.exists(),
                        '  \nVerification status: '
                          & repeat(item)
                            .where(linkId='condition-verification-status')
                            .answer.valueCoding.display.first(),
                        ''
                      )
                      & iif(
                        repeat(item)
                          .where(linkId='condition-severity')
                          .answer.valueCoding.exists(),
                        '  \nSeverity: '
                          & repeat(item)
                            .where(linkId='condition-severity')
                            .answer.valueCoding.display.first(),
                        ''
                      )
                      & iif(
                        repeat(item)
                          .where(linkId='condition-onset-datetime')
                          .answer.valueDateTime.exists(),
                        '  \nOnset: '
                          & repeat(item)
                            .where(linkId='condition-onset-datetime')
                            .answer.valueDateTime.first().toString(),
                        ''
                      )
                      & iif(
                        repeat(item)
                          .where(linkId='condition-abatement-datetime')
                          .answer.valueDateTime.exists(),
                        '\nAbatement: '
                          & repeat(item)
                            .where(linkId='condition-abatement-datetime')
                            .answer.valueDateTime.first().toString(),
                        ''
                      )
                      & iif(
                        repeat(item)
                          .where(linkId='condition-notes')
                          .answer.valueString.exists(),
                        '  \n\nNotes: '
                          & repeat(item)
                            .where(linkId='condition-notes')
                            .answer.valueString.first(),
                        ''
                      ),
                      ''
                    )
                  )
                  .where($this != '')
                  .join('\n\n\n')

      - linkId: allergies-section
        text: Allergies & Intolerances
        type: group
        item:
          - linkId: allergies
            text: Allergy/Intolerance
            type: group
            repeats: true
            item:
              - linkId: allergy-id
                text: Allergy ID
                type: string
                hidden: true

              - linkId: allergy-code
                text: Allergy or Intolerance
                type: choice
                entryFormat: Select allergy or intolerance
                required: true
                answerValueSet: https://healthterminologies.gov.au/fhir/ValueSet/indicator-hypersensitivity-intolerance-to-substance-2
                preferredTerminologyServer: https://tx.ontoserver.csiro.au/fhir

              - linkId: allergy-type
                text: Type
                type: choice
                entryFormat: Select type
                answerOption:
                  - valueCoding:
                      system: http://hl7.org/fhir/allergy-intolerance-type
                      code: allergy
                      display: Allergy
                  - valueCoding:
                      system: http://hl7.org/fhir/allergy-intolerance-type
                      code: intolerance
                      display: Intolerance

              - linkId: allergy-onset-datetime
                text: Onset Date/Time
                helpText: "When the allergy or intolerance was first diagnosed?"
                type: dateTime

              - linkId: allergy-clinical-status
                text: Clinical Status
                type: choice
                entryFormat: Select clinical status
                answerValueSet: http://hl7.org/fhir/ValueSet/allergyintolerance-clinical
                preferredTerminologyServer: https://tx.ontoserver.csiro.au/fhir

              - linkId: allergy-verification-status
                text: Verification Status
                type: choice
                entryFormat: Select verification status
                answerValueSet: http://hl7.org/fhir/ValueSet/allergyintolerance-verification
                preferredTerminologyServer: https://tx.ontoserver.csiro.au/fhir
            
              - linkId: allergy-notes
                text: Notes
                type: text
                entryFormat: Write here

              - linkId: allergy-reaction-group
                text: Reaction
                type: group
                repeats: true
                item:
                  - linkId: allergy-manifestation
                    text: Manifestation
                    type: choice
                    entryFormat: Select manifestation
                    required: true
                    answerValueSet: https://healthterminologies.gov.au/fhir/ValueSet/adverse-reaction-clinical-manifestation-1
                    preferredTerminologyServer: https://tx.ontoserver.csiro.au/fhir

                  - linkId: allergy-severity
                    text: Severity
                    type: choice
                    entryFormat: Select severity
                    answerOption:
                      - valueCoding:
                          system: http://hl7.org/fhir/reaction-event-severity
                          code: mild
                          display: Mild
                      - valueCoding:
                          system: http://hl7.org/fhir/reaction-event-severity
                          code: moderate
                          display: Moderate
                      - valueCoding:
                          system: http://hl7.org/fhir/reaction-event-severity
                          code: severe
                          display: Severe

          - linkId: allergies-summary
            text: Summary
            type: text
            readOnly: true
            calculatedExpression:
              language: text/fhirpath
              expression: >-
                %resource.repeat(item)
                  .where(linkId='allergies')
                  .select(
                    iif(
                      repeat(item)
                        .where(linkId='allergy-code')
                        .answer.valueCoding.exists(),
                      'Allergy: '
                        & repeat(item)
                          .where(linkId='allergy-code')
                          .answer.valueCoding.display.first()
                      & iif(
                        repeat(item)
                          .where(linkId='allergy-type')
                          .answer.valueCoding.exists(),
                        '  \nType: '
                          & repeat(item)
                            .where(linkId='allergy-type')
                            .answer.valueCoding.display.first(),
                        ''
                      )
                      & iif(
                        repeat(item)
                          .where(linkId='allergy-clinical-status')
                          .answer.valueCoding.exists(),
                        '  \nClinical status: '
                          & repeat(item)
                            .where(linkId='allergy-clinical-status')
                            .answer.valueCoding.display.first(),
                        ''
                      )
                      & iif(
                        repeat(item)
                          .where(linkId='allergy-verification-status')
                          .answer.valueCoding.exists(),
                        '  \nVerification status: '
                          & repeat(item)
                            .where(linkId='allergy-verification-status')
                            .answer.valueCoding.display.first(),
                        ''
                      )
                      & iif(
                        repeat(item)
                          .where(linkId='allergy-onset-datetime')
                          .answer.valueDateTime.exists(),
                        '  \nOnset: '
                          & repeat(item)
                            .where(linkId='allergy-onset-datetime')
                            .answer.valueDateTime.first().toString(),
                        ''
                      )
                      & iif(
                        repeat(item)
                          .where(linkId='allergy-reaction-group')
                          .answer.exists(),
                        '  \nReactions: '
                          & repeat(item)
                            .where(linkId='allergy-reaction-group')
                            .select(
                              repeat(item)
                                .where(linkId='allergy-manifestation')
                                .answer.valueCoding.display.first()
                              & iif(
                                repeat(item)
                                  .where(linkId='allergy-severity')
                                  .answer.valueCoding.exists(),
                                ' ('
                                  & repeat(item)
                                    .where(linkId='allergy-severity')
                                    .answer.valueCoding.display.first()
                                  & ')',
                                ''
                              )
                            )
                            .where($this.exists())
                            .join(', '),
                        ''
                      )
                      & iif(
                        repeat(item)
                          .where(linkId='allergy-notes')
                          .answer.valueString.exists(),
                        '  \n\nNotes: '
                          & repeat(item)
                            .where(linkId='allergy-notes')
                            .answer.valueString.first(),
                        ''
                      ),
                      ''
                    )
                  )
                  .where($this != '')
                  .join('\n\n\n')

      - linkId: social-history-section
        text: Social History
        type: group
        item:
          - linkId: smoking-status
            text: Smoking Status
            type: choice
            entryFormat: Select smoking status
            answerValueSet: https://healthterminologies.gov.au/fhir/ValueSet/smoking-status-1
            preferredTerminologyServer: https://tx.ontoserver.csiro.au/fhir
            initialExpression:
              language: text/fhirpath
              expression: "%SocialHistoryBundle.entry.resource.entry.resource.where(code.coding.where(system='http://snomed.info/sct' and code='1747861000168109').first()).first().valueCodeableConcept.coding"
          
          - linkId: pregnancy-status
            text: Pregnancy Status
            type: choice
            enableWhenExpression:
              language: text/fhirpath
              expression: "iif(%resource.repeat(item).where(linkId='patient-gender').answer.valueString.first() = 'female', true, false)"                
            answerOption:
              - valueCoding:
                  system: http://snomed.info/sct
                  code: "77386006"
                  display: Pregnant
              - valueCoding:
                  system: http://snomed.info/sct
                  code: "60001007"
                  display: Not pregnant
              - valueCoding:
                  system: http://snomed.info/sct
                  code: "261665006"
                  display: Unknown
            initialExpression:
              language: text/fhirpath
              expression: "%SocialHistoryBundle.entry.resource.entry.resource
                .where(code.coding.where(system='http://loinc.org' and code='82810-3').first())
                .first().valueCodeableConcept.coding
                  .where(system='http://snomed.info/sct').first()"

          - linkId: social-history-summary
            text: Summary
            type: text
            readOnly: true
            calculatedExpression:
              language: text/fhirpath
              expression: >-
                (
                  iif(
                    %resource.repeat(item).where(linkId='smoking-status').answer.valueCoding.exists(),
                    'Smoking status: '
                      & %resource.repeat(item).where(linkId='smoking-status').answer.valueCoding.display.first(),
                    ''
                  )
                  &
                  iif(
                    %resource.repeat(item).where(linkId='pregnancy-status').answer.valueCoding.exists(),
                    iif(
                      %resource.repeat(item).where(linkId='smoking-status').answer.valueCoding.exists(),
                      '  \n',
                      ''
                    )
                    & 'Pregnancy status: '
                    & %resource.repeat(item).where(linkId='pregnancy-status').answer.valueCoding.display.first(),
                    ''
                  )
                )
       
      - linkId: procedures-section
        text: Procedures
        type: group
        item:
          - linkId: procedures
            text: Procedure
            type: group
            repeats: true
            item:
              - linkId: procedure-id
                text: Procedure ID
                type: string
                hidden: true
                  
              - linkId: procedure-code
                text: Procedure
                type: choice
                entryFormat: Select procedure
                required: true
                answerValueSet: https://healthterminologies.gov.au/fhir/ValueSet/procedure-1
                preferredTerminologyServer: https://tx.ontoserver.csiro.au/fhir

              - linkId: procedure-performed-datetime
                required: true
                text: Performed Date/Time
                helpText: "The date/time when the procedure is/was/will be performed"
                type: dateTime

              - linkId: procedure-status
                text: Status
                type: choice
                entryFormat: Select status
                required: true
                answerOption:
                  - valueCoding:
                      system: http://hl7.org/fhir/event-status
                      code: preparation
                      display: Preparation
                  - valueCoding:
                      system: http://hl7.org/fhir/event-status
                      code: in-progress
                      display: In Progress
                  - valueCoding:
                      system: http://hl7.org/fhir/event-status
                      code: not-done
                      display: Not Done
                  - valueCoding:
                      system: http://hl7.org/fhir/event-status
                      code: on-hold
                      display: On Hold
                  - valueCoding:
                      system: http://hl7.org/fhir/event-status
                      code: stopped
                      display: Stopped
                  - valueCoding:
                      system: http://hl7.org/fhir/event-status
                      code: completed
                      display: Completed
                  - valueCoding:
                      system: http://hl7.org/fhir/event-status
                      code: entered-in-error
                      display: Entered in Error
                  - valueCoding:
                      system: http://hl7.org/fhir/event-status
                      code: unknown
                      display: Unknown
              
              - linkId: procedure-reason
                text: Reason for procedure
                type: choice
                answerValueSet: http://hl7.org/fhir/ValueSet/procedure-reason
                preferredTerminologyServer: https://tx.ontoserver.csiro.au/fhir

          - linkId: procedures-summary
            text: Summary
            type: text
            readOnly: true
            calculatedExpression:
              language: text/fhirpath
              expression: >-
                %resource.repeat(item)
                  .where(linkId='procedures')
                  .select(
                    iif(
                      repeat(item)
                        .where(linkId='procedure-code')
                        .answer.valueCoding.exists(),
                      'Procedure: '
                        & repeat(item)
                          .where(linkId='procedure-code')
                          .answer.valueCoding.display.first()
                      & iif(
                        repeat(item)
                          .where(linkId='procedure-status')
                          .answer.valueCoding.exists(),
                        '  \nStatus: '
                          & repeat(item)
                            .where(linkId='procedure-status')
                            .answer.valueCoding.display.first(),
                        ''
                      )
                      & iif(
                        repeat(item)
                          .where(linkId='procedure-performed-datetime')
                          .answer.valueDateTime.exists(),
                        '  \nPerformed: '
                          & repeat(item)
                            .where(linkId='procedure-performed-datetime')
                            .answer.valueDateTime.first().toString(),
                        ''
                      )
                      & iif(
                        repeat(item)
                          .where(linkId='procedure-reason')
                          .answer.valueCoding.exists(),
                        '  \n\nReason:  \n'
                          & repeat(item)
                            .where(linkId='procedure-reason')
                            .answer.valueCoding.display.first(),
                        ''
                      ),
                      ''
                    )
                  )
                  .where($this != '')
                  .join('\n\n\n')

      - linkId: medications-section
        text: Medications
        type: group
        item:
          - linkId: medications
            text: Medication
            type: group
            repeats: true
            item:
              - linkId: medication-statement-id
                text: Medication Statement ID
                type: string
                hidden: true

              - linkId: medication-amt-code
                text: AMT Code
                type: choice
                entryFormat: Select AMT code
                answerValueSet: https://healthterminologies.gov.au/fhir/ValueSet/australian-medication-1
                preferredTerminologyServer: https://tx.ontoserver.csiro.au/fhir
                choiceColumn:
                  - path: code + ' - ' + display
                    forDisplay: true
                    
              - linkId: medication-effective-datetime
                text: Effective Date/Time
                helpText: "When the medication is/was/will be taken?"
                type: dateTime
                required: true

              - linkId: medication-status
                text: Status
                type: choice
                entryFormat: Select status
                answerOption:
                  - valueCoding:
                      system: http://hl7.org/fhir/CodeSystem/medication-statement-status
                      code: active
                      display: Active
                  - valueCoding:
                      system: http://hl7.org/fhir/CodeSystem/medication-statement-status
                      code: completed
                      display: Completed
                  - valueCoding:
                      system: http://hl7.org/fhir/CodeSystem/medication-statement-status
                      code: entered-in-error
                      display: Entered in Error
                  - valueCoding:
                      system: http://hl7.org/fhir/CodeSystem/medication-statement-status
                      code: intended
                      display: Intended
                  - valueCoding:
                      system: http://hl7.org/fhir/CodeSystem/medication-statement-status
                      code: stopped
                      display: Stopped
                  - valueCoding:
                      system: http://hl7.org/fhir/CodeSystem/medication-statement-status
                      code: on-hold
                      display: On Hold
                  - valueCoding:
                      system: http://hl7.org/fhir/CodeSystem/medication-statement-status
                      code: unknown
                      display: Unknown
                  - valueCoding:
                      system: http://hl7.org/fhir/CodeSystem/medication-statement-status
                      code: not-taken
                      display: Not Taken

              - linkId: medication-asserted-datetime
                text: Asserted Date/Time
                helpText: "When the statement was asserted?"
                type: dateTime

              - linkId: medication-reason
                text: Reason
                type: choice
                entryFormat: Select reason
                answerValueSet: https://healthterminologies.gov.au/fhir/ValueSet/medication-reason-taken-1|1.1.0
                preferredTerminologyServer: https://tx.ontoserver.csiro.au/fhir

              - linkId: medication-dosage
                text: Dosage
                type: group
                repeats: true
                item:
                  - linkId: medication-dosage-amount
                    text: Amount
                    type: string
                    entryFormat: Enter amount
                    initialExpression:
                      language: text/fhirpath
                      expression: "%context.text"
          
          - linkId: medications-summary
            text: Summary
            type: text
            readOnly: true
            calculatedExpression:
              language: text/fhirpath
              expression: >-
                %resource.repeat(item)
                  .where(linkId='medications')
                  .select(
                    iif(
                      repeat(item)
                        .where(linkId='medication-amt-code')
                        .answer.valueCoding.exists()
                      or
                      repeat(item)
                        .where(linkId='medication-pbs-code')
                        .answer.valueCoding.exists(),
                      'Medication: '
                        &
                        iif(
                          repeat(item)
                            .where(linkId='medication-amt-code')
                            .answer.valueCoding.exists(),
                          repeat(item)
                            .where(linkId='medication-amt-code')
                            .answer.valueCoding.display.first(),
                          ''
                        )
                        &
                        iif(
                          repeat(item)
                            .where(linkId='medication-amt-code')
                            .answer.valueCoding.exists()
                          and
                          repeat(item)
                            .where(linkId='medication-pbs-code')
                            .answer.valueCoding.exists(),
                          ' • ',
                          ''
                        )
                        &
                        iif(
                          repeat(item)
                            .where(linkId='medication-pbs-code')
                            .answer.valueCoding.exists(),
                          repeat(item)
                            .where(linkId='medication-pbs-code')
                            .answer.valueCoding.display.first(),
                          ''
                        )
                        & iif(
                          repeat(item)
                            .where(linkId='medication-amt-code')
                            .answer.valueCoding.exists()
                          or
                          repeat(item)
                            .where(linkId='medication-pbs-code')
                            .answer.valueCoding.exists(),
                          '  \nCodes: '
                            &
                            iif(
                              repeat(item)
                                .where(linkId='medication-amt-code')
                                .answer.valueCoding.exists(),
                              'AMT '
                                &
                                repeat(item)
                                  .where(linkId='medication-amt-code')
                                  .answer.valueCoding.code.first(),
                              ''
                            )
                            &
                            iif(
                              repeat(item)
                                .where(linkId='medication-amt-code')
                                .answer.valueCoding.exists()
                              and
                              repeat(item)
                                .where(linkId='medication-pbs-code')
                                .answer.valueCoding.exists(),
                              ' • ',
                              ''
                            )
                            &
                            iif(
                              repeat(item)
                                .where(linkId='medication-pbs-code')
                                .answer.valueCoding.exists(),
                              'PBS '
                                &
                                repeat(item)
                                  .where(linkId='medication-pbs-code')
                                  .answer.valueCoding.code.first()
                                & ' ('
                                & repeat(item)
                                  .where(linkId='medication-pbs-code')
                                  .answer.valueCoding.display.first()
                                & ')',
                              ''
                            ),
                          ''
                        )
                        & iif(
                          repeat(item)
                            .where(linkId='medication-status')
                            .answer.valueCoding.exists(),
                          '  \nStatus: '
                            &
                            repeat(item)
                              .where(linkId='medication-status')
                              .answer.valueCoding.display.first(),
                          ''
                        )
                        & '  \nEffective: '
                        &
                        repeat(item)
                          .where(linkId='medication-effective-datetime')
                          .answer.valueDateTime.first()
                          .toString()
                        & '  \nAsserted: '
                        &
                        repeat(item)
                          .where(linkId='medication-asserted-datetime')
                          .answer.valueDateTime.first()
                          .toString()
                        & iif(
                          repeat(item)
                            .where(linkId='medication-reason')
                            .answer.valueCoding.exists(),
                          '  \nReason: '
                            &
                            repeat(item)
                              .where(linkId='medication-reason')
                              .answer.valueCoding.display.first(),
                          ''
                        )
                        &
                        iif(
                          repeat(item)
                            .where(linkId='medication-dosage')
                            .select(
                              repeat(item)
                                .where(linkId='medication-dosage-amount')
                                .answer.valueString
                            )
                            .where($this != '')
                            .exists(),
                          '  \nDosage: '
                            &
                            repeat(item)
                              .where(linkId='medication-dosage')
                              .select(
                                repeat(item)
                                  .where(linkId='medication-dosage-amount')
                                  .answer.valueString
                              )
                              .where($this != '')
                              .join('; '),
                          ''
                        ),
                      ''
                    )
                  )
                  .where($this != '')
                  .join('\n\n\n')

      - linkId: immunizations-section
        text: Immunizations
        type: group
        item:
          - linkId: immunizations
            text: Immunization
            type: group
            repeats: true
            item:
              - linkId: immunization-id
                text: Immunization ID
                type: string
                hidden: true

              - linkId: immunization-vaccine-amt-code
                text: AMT Code
                type: choice
                entryFormat: Select AMT code
                answerValueSet: https://healthterminologies.gov.au/fhir/ValueSet/amt-vaccine-1
                preferredTerminologyServer: https://tx.ontoserver.csiro.au/fhir

              - linkId: immunization-vaccine-air-code
                text: AIR Code
                type: choice
                entryFormat: Select AIR code
                answerValueSet: https://healthterminologies.gov.au/fhir/ValueSet/australian-immunisation-register-vaccine-1
                preferredTerminologyServer: https://tx.ontoserver.csiro.au/fhir

              - linkId: immunization-occurrence-datetime
                text: Occurrence Date/Time
                helpText: "The date/time when the immunization is/was/will be administered"
                required: true
                type: dateTime

              - linkId: immunization-status
                text: Status
                type: choice
                entryFormat: Select status
                required: true
                answerOption:
                  - valueCoding:
                      system: http://hl7.org/fhir/event-status
                      code: completed
                      display: Completed
                  - valueCoding:
                      system: http://hl7.org/fhir/event-status
                      code: entered-in-error
                      display: Entered in Error
                  - valueCoding:
                      system: http://hl7.org/fhir/event-status
                      code: not-done
                      display: Not Done

              - linkId: immunization-primary-source
                text: Primary Source
                type: boolean
                helpText: "Indicates whether the data was recorded by the provider who administered the vaccine"

              - linkId: immunization-lot-number
                text: Vaccine Lot Number
                type: string
                entryFormat: Enter lot number

              - linkId: immunization-notes
                text: Notes
                type: text
                entryFormat: Write here

          - linkId: immunizations-summary
            text: Summary
            type: text
            readOnly: true
            calculatedExpression:
              language: text/fhirpath
              expression: >-
                %resource.repeat(item)
                  .where(linkId='immunizations')
                  .select(
                    iif(
                      repeat(item)
                        .where(linkId='immunization-vaccine-amt-code')
                        .answer.valueCoding.exists()
                      or
                      repeat(item)
                        .where(linkId='immunization-vaccine-air-code')
                        .answer.valueCoding.exists()
                      or
                      repeat(item)
                        .where(linkId='immunization-status')
                        .answer.valueCoding.exists()
                      or
                      repeat(item)
                        .where(linkId='immunization-occurrence-datetime')
                        .answer.valueDateTime.exists()
                      or
                      repeat(item)
                        .where(linkId='immunization-primary-source')
                        .answer.valueBoolean.exists()
                      or
                      repeat(item)
                        .where(linkId='immunization-lot-number')
                        .answer.valueString.exists()
                      or
                      repeat(item)
                        .where(linkId='immunization-notes')
                        .answer.valueString.exists(),
                      iif(
                        repeat(item)
                          .where(linkId='immunization-vaccine-amt-code')
                          .answer.valueCoding.exists(),
                        'AMT Code: '
                          & repeat(item)
                            .where(linkId='immunization-vaccine-amt-code')
                            .answer.valueCoding.display.first()
                          & '  \n',
                        ''
                      )
                      & iif(
                        repeat(item)
                          .where(linkId='immunization-vaccine-air-code')
                          .answer.valueCoding.exists(),
                        'AIR Code: '
                          & repeat(item)
                            .where(linkId='immunization-vaccine-air-code')
                            .answer.valueCoding.display.first()
                          & '  \n',
                        ''
                      )
                      & iif(
                        repeat(item)
                          .where(linkId='immunization-status')
                          .answer.valueCoding.exists(),
                        'Status: '
                          & repeat(item)
                            .where(linkId='immunization-status')
                            .answer.valueCoding.display.first()
                          & '  \n',
                        ''
                      )
                      & iif(
                        repeat(item)
                          .where(linkId='immunization-occurrence-datetime')
                          .answer.valueDateTime.exists(),
                        'Occurred: '
                          & repeat(item)
                            .where(linkId='immunization-occurrence-datetime')
                            .answer.valueDateTime.first()
                            .toString()
                          & '  \n',
                        ''
                      )
                      & iif(
                        repeat(item)
                          .where(linkId='immunization-primary-source')
                          .answer.valueBoolean.exists(),
                        'Source: '
                          & iif(
                            repeat(item)
                              .where(linkId='immunization-primary-source')
                              .answer.valueBoolean.first(),
                            'Primary',
                            'Not primary'
                          )
                          & '  \n',
                        ''
                      )
                      & iif(
                        repeat(item)
                          .where(linkId='immunization-lot-number')
                          .answer.valueString.exists(),
                        'Lot: '
                          & repeat(item)
                            .where(linkId='immunization-lot-number')
                            .answer.valueString.first()
                          & '  \n',
                        ''
                      )
                      & iif(
                        repeat(item)
                          .where(linkId='immunization-notes')
                          .answer.valueString.exists(),
                        '\nNotes: '
                          & repeat(item)
                            .where(linkId='immunization-notes')
                            .answer.valueString.first(),
                        ''
                      ),
                      ''
                    )
                  )
                  .where($this != '')
                  .join('\n\n')

      - linkId: vital-signs-section
        text: Vital Signs
        type: group
        item:
          - linkId: systolic-bp
            text: Systolic Blood Pressure
            type: quantity
            entryFormat: Enter value
            unitOption:
              - code: "mm[Hg]"
                system: http://unitsofmeasure.org
                display: mmHg

          - linkId: diastolic-bp
            text: Diastolic Blood Pressure
            type: quantity
            entryFormat: Enter value
            unitOption:
              - code: "mm[Hg]"
                system: http://unitsofmeasure.org
                display: mmHg

          - linkId: heart-rate
            text: Heart Rate
            type: quantity
            entryFormat: Enter value
            unitOption:
              - code: "/min"
                system: http://unitsofmeasure.org
                display: beats/min

          - linkId: body-weight
            text: Body Weight
            type: quantity
            entryFormat: Enter value
            unitOption:
              - code: kg
                system: http://unitsofmeasure.org
                display: kg

          - linkId: vital-signs-summary
            text: Summary
            type: text
            readOnly: true
            calculatedExpression:
              language: text/fhirpath
              expression: |-
                (
                  iif(
                    %resource.repeat(item).where(linkId='systolic-bp').answer.valueQuantity.exists()
                      and %resource.repeat(item).where(linkId='diastolic-bp').answer.valueQuantity.exists(),
                    'Blood pressure: '
                      & %resource.repeat(item).where(linkId='systolic-bp').answer.valueQuantity.value.first().toString()
                      & '/'
                      & %resource.repeat(item).where(linkId='diastolic-bp').answer.valueQuantity.value.first().toString()
                      & ' mmHg',
                    ''
                  )
                )
                &
                (
                  iif(
                    %resource.repeat(item).where(linkId='heart-rate').answer.valueQuantity.exists(),
                    iif(
                      %resource.repeat(item).where(linkId='systolic-bp').answer.valueQuantity.exists()
                        and %resource.repeat(item).where(linkId='diastolic-bp').answer.valueQuantity.exists(),
                      '  \n',
                      ''
                    )
                    & 'Heart rate: '
                    & %resource.repeat(item).where(linkId='heart-rate').answer.valueQuantity.value.first().toString()
                    & ' /min',
                    ''
                  )
                )
                &
                (
                  iif(
                    %resource.repeat(item).where(linkId='body-weight').answer.valueQuantity.exists(),
                    iif(
                      %resource.repeat(item).where(linkId='systolic-bp').answer.valueQuantity.exists()
                        and %resource.repeat(item).where(linkId='diastolic-bp').answer.valueQuantity.exists()
                        or %resource.repeat(item).where(linkId='heart-rate').answer.valueQuantity.exists(),
                      '  \n',
                      ''
                    )
                    & 'Body weight: '
                    & %resource.repeat(item).where(linkId='body-weight').answer.valueQuantity.value.first().toString()
                    & ' kg',
                    ''
                  )
                )

      - linkId: document-section
        text: Document
        type: group
        item:
          - linkId: composition-title
            text: Document Title
            type: string
            initialExpression:
              language: text/fhirpath
              expression: "%Patient.name.first().given.first() + ' ' + %Patient.name.first().family + ' Discharge summary'"

          - linkId: patient-information
            text: Patient Information
            type: group
            item:
              - linkId: patient-id
                text: Patient ID
                type: string
                hidden: true
                initialExpression:
                  language: text/fhirpath
                  expression: "%Patient.id"

              - linkId: patient-name
                text: Name
                type: string
                readOnly: true
                initialExpression:
                  language: text/fhirpath
                  expression: "%Patient.name.first().given.first() + ' ' + %Patient.name.first().family"

              - linkId: patient-medicare-number
                text: Medicare Number
                type: string
                readOnly: true
                initialExpression:
                  language: text/fhirpath
                  expression: "%Patient.identifier.where(system='http://ns.electronichealth.net.au/id/medicare-number').first().value"

              - linkId: patient-gender
                text: Gender
                type: string
                readOnly: true
                initialExpression:
                  language: text/fhirpath
                  expression: "%Patient.gender"

              - linkId: patient-birthDate
                text: Birth Date
                type: date
                readOnly: true
                initialExpression:
                  language: text/fhirpath
                  expression: "%Patient.birthDate"

          - linkId: summary-section
            text: Summary
            type: group
            item:
              - linkId: encounter-summary
                type: display
                itemControl:
                  coding:
                    - code: markdown
                _text:
                  cqfExpression:
                    language: text/fhirpath
                    expression: >-
                      iif(
                        (
                          %resource.repeat(item).where(linkId='problems-summary').first().answer.valueString.exists()
                          or %resource.repeat(item).where(linkId='allergies-summary').first().answer.valueString.exists()
                          or %resource.repeat(item).where(linkId='social-history-summary').first().answer.valueString.exists()
                          or %resource.repeat(item).where(linkId='procedures-summary').first().answer.valueString.exists()
                          or %resource.repeat(item).where(linkId='medications-summary').first().answer.valueString.exists()
                          or %resource.repeat(item).where(linkId='immunizations-summary').first().answer.valueString.exists()
                          or %resource.repeat(item).where(linkId='vital-signs-summary').first().answer.valueString.exists()
                        ),
                        (
                          iif(
                            %resource.repeat(item).where(linkId='problems-summary').first().answer.valueString.exists(),
                            '### Problems' & '\n\n' & %resource.repeat(item).where(linkId='problems-summary').first().answer.valueString.first(),
                            ''
                          )
                          |
                          iif(
                            %resource.repeat(item).where(linkId='allergies-summary').first().answer.valueString.exists(),
                            '### Allergies & Intolerances' & '\n\n' & %resource.repeat(item).where(linkId='allergies-summary').first().answer.valueString.first(),
                            ''
                          )
                          |
                          iif(
                            %resource.repeat(item).where(linkId='social-history-summary').first().answer.valueString.exists(),
                            '### Social History' & '\n\n' & %resource.repeat(item).where(linkId='social-history-summary').first().answer.valueString.first(),
                            ''
                          )
                          |
                          iif(
                            %resource.repeat(item).where(linkId='procedures-summary').first().answer.valueString.exists(),
                            '### Procedures' & '\n\n' & %resource.repeat(item).where(linkId='procedures-summary').first().answer.valueString.first(),
                            ''
                          )
                          |
                          iif(
                            %resource.repeat(item).where(linkId='medications-summary').first().answer.valueString.exists(),
                            '### Medications' & '\n\n' & %resource.repeat(item).where(linkId='medications-summary').first().answer.valueString.first(),
                            ''
                          )
                          |
                          iif(
                            %resource.repeat(item).where(linkId='immunizations-summary').first().answer.valueString.exists(),
                            '### Immunizations' & '\n\n' & %resource.repeat(item).where(linkId='immunizations-summary').first().answer.valueString.first(),
                            ''
                          )
                          |
                          iif(
                            %resource.repeat(item).where(linkId='vital-signs-summary').first().answer.valueString.exists(),
                            '### Vital Signs' & '\n\n' & %resource.repeat(item).where(linkId='vital-signs-summary').first().answer.valueString.first(),
                            ''
                          )
                        ).where($this != '').join('\n\n\n'),
                        'No summary sections completed yet.'
                      )

          - linkId: composition-date
            text: Document Date
            type: dateTime
            required: true
            initialExpression:
              language: text/fhirpath
              expression: "now()"